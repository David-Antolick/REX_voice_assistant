audio:
  sample_rate: 16000
  frame_ms: 32
  # device: null  # Use system default, or set to device index/name

model:
  name: "small.en"
  device: "cuda"
  beam_size: 1
  cache_dir: "~/.rex/models"

services:
  active: "none"  # none | ytmd | spotify
  ytmd:
    host: "localhost"
    port: 9863
  spotify:
    redirect_uri: "http://127.0.0.1:8888/callback"

performance:
  vad_silence_ms: 250      # Silence timeout before sending to Whisper (low-latency default: 250, standard: 400)
  low_latency_mode: true   # Default on. Use --standard or set false for slower, more forgiving VAD timing.

wake_word:
  enabled: true                 # Default on. Use --no-wake-word or set false to disable.
  model: "hey_rex"              # Custom REX model, auto-downloads from Hugging Face on first run.
                                # Other options: "hey_jarvis" (openWakeWord prebuilt) or a file path.
  threshold: 0.5                # Detection confidence (0.0 - 1.0)
  listening_window_seconds: 6   # How long after a wake-word fire commands are accepted
  debounce_seconds: 1.0         # Minimum time between consecutive fires
  cue_enabled: true             # Play a short audio tone on wake-word fire

dashboard:
  enabled: false
  port: 9876
  retention_hours: 24

logging:
  level: "INFO"
  file: "~/.rex/logs/rex.log"
